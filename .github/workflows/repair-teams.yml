name: One-off — unify users onto main workspace

on:
  workflow_dispatch:

jobs:
  repair:
    name: SSH Repair
    runs-on: ubuntu-latest

    steps:
      - name: Attach all users to team 1 and switch them to it
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            cd "$HOME/public_html/new_contacts"
            echo "=== before ==="
            php artisan tinker --execute='echo \App\Models\User::query()->get(["id","role","current_team_id"])->toJson(), "\n";' 2>&1 | tail -2
            echo "=== repair ==="
            php artisan tinker --execute='foreach (\App\Models\User::whereKeyNot(1)->get() as $u) { $u->teams()->syncWithoutDetaching([1 => ["role" => "member"]]); $u->forceFill(["current_team_id" => 1])->save(); echo "user {$u->id} ({$u->role}) -> team 1\n"; }' 2>&1 | tail -6
            echo "=== after ==="
            php artisan tinker --execute='echo \App\Models\User::query()->get(["id","role","current_team_id"])->toJson(), "\n";' 2>&1 | tail -2
            echo "=== clerk search simulation (team 1, number 9503466923) ==="
            php artisan tinker --execute='echo \App\Models\Contact::where("team_id", 1)->where(fn($q) => $q->where("phone","like","%9503466923%")->orWhere("number","like","%9503466923%"))->where(fn($q) => $q->whereNull("approval_status")->orWhere("approval_status","!=","pending"))->count(), " match(es)\n";' 2>&1 | tail -2
