name: Diagnose server

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: SSH Diagnose
    runs-on: ubuntu-latest

    steps:
      - name: Inspect server state
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            cd "$HOME/public_html/new_contacts"
            echo "=== discarding stale manual edit to _form.blade.php ==="
            git checkout -- resources/views/contacts/_form.blade.php
            echo "=== git status after checkout ==="
            git status --short | grep -v '^?? ' || true
            echo "=== end ==="
